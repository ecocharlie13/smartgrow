<!DOCTYPE html>
<html>
<head>
<title>Smart Grow Dashboard</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:120px;
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
width:300px;
margin:auto;
padding:40px;
border-radius:12px;
}

.status{
font-size:40px;
font-weight:bold;
margin-top:20px;
}

.normal{
color:#22c55e;
}

.alarm{
color:#ef4444;
}
</style>

</head>

<body>

<div class="card">

<h2>Nivel Runoff</h2>

<div id="status" class="status">Carregando...</div>

</div>

<script>

const state = 0;

const statusDiv = document.getElementById("status");

if(state === 0){
statusDiv.innerHTML = "NORMAL";
statusDiv.classList.add("normal");
}
else{
statusDiv.innerHTML = "ALARM";
statusDiv.classList.add("alarm");
}

</script>

</body>
</html>
