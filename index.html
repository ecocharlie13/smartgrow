<script>
async function atualizar(){

const res = await fetch("https://wispy-moon-d17f.ecocharlie13.workers.dev");
const data = await res.json();

let estado = data.result[0].value;

let texto = "NORMAL";
let cor = "#22c55e";

if(estado == 1){
texto = "ALERTA";
cor = "#ef4444";
}

document.getElementById("status").innerText = texto;
document.getElementById("status").style.color = cor;

}

setInterval(atualizar,5000);
atualizar();
</script>
