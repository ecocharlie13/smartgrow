<!DOCTYPE html>
<html>
<head>
<title>Smart Grow Dashboard</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 120px;
    background: #0f172a;
    color: white;
  }
  .card {
    background: #1e293b;
    width: 300px;
    margin: auto;
    padding: 40px;
    border-radius: 12px;
  }
  .status {
    font-size: 40px;
    font-weight: bold;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="card">
  <h2>Nível Runoff</h2>
  <div id="status" class="status">Carregando...</div>
</div>

<script>
async function atualizar() {
  try {
    const res = await fetch('https://SEU_ENDPOINT_CORRETO_AQUI'); // substitua pelo endpoint Tuya correto
    const data = await res.json();
    
    let estado = data.state; // 0 = NORMAL, 1 = INUNDADO
    let texto = estado === 1 ? "INUNDADO" : "NORMAL";
    let cor = estado === 1 ? "#ef4444" : "#22c55e";

    document.getElementById("status").innerText = texto;
    document.getElementById("status").style.color = cor;
  } catch (e) {
    document.getElementById("status").innerText = "ERRO API";
    document.getElementById("status").style.color = "#f59e0b";
  }
}

// Atualiza imediatamente e depois a cada 5 segundos
atualizar();
setInterval(atualizar, 5000);
</script>

</body>
</html>
